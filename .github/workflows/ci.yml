name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests-and-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with release-check extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -q

      - name: Run public examples
        run: |
          PYTHONPATH=src python examples/stable_partition_basic.py
          PYTHONPATH=src python examples/cover_basic.py
          PYTHONPATH=src python examples/geometry_validation_basic.py
          PYTHONPATH=src python examples/residual_sampler_research_demo.py

      - name: Run benchmark smoke checks
        run: |
          PYTHONPATH=src python -m rdt_adaptive_hierarchy.benchmarks.stable_partition_bench --seeds 1 --n 1000 --output-dir results/tmp/ci_stable
          PYTHONPATH=src python -m rdt_adaptive_hierarchy.benchmarks.cover_bench --seeds 1 --budget 128 --output-dir results/tmp/ci_cover
          PYTHONPATH=src python -m rdt_adaptive_hierarchy.benchmarks.geometry_bench --output-dir results/tmp/ci_geometry

      - name: Build source and wheel distributions
        run: python -m build
