<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
<rect width="100%" height="100%" fill="#fbfbf8"/>
<text x="60" y="42" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#222">Stable ancestor-label inheritance</text>
<text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="14" fill="#555">When a bucket splits, one child keeps the parent label. Only the newly exposed branch receives a new label.</text>
<text x="160" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#333">Before resize: k = 3</text>
<rect x="80" y="150" width="160" height="90" fill="#4C78A8" opacity="0.82" rx="8"/>
<text x="160.0" y="200.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label A</text>
<rect x="260" y="150" width="160" height="90" fill="#F58518" opacity="0.82" rx="8"/>
<text x="340.0" y="200.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label B</text>
<rect x="170" y="270" width="160" height="90" fill="#54A24B" opacity="0.82" rx="8"/>
<text x="250.0" y="320.0" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label C</text>
<path d="M450 255 L545 255" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
<text x="497" y="235" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#444">split label B</text>
<text x="740" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#333">After resize: k = 4</text>
<rect x="610" y="150" width="145" height="85" fill="#4C78A8" opacity="0.86" rx="8"/>
<text x="682.5" y="197.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label A</text>
<rect x="775" y="150" width="145" height="85" fill="#F58518" opacity="0.86" rx="8"/>
<text x="847.5" y="197.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label B</text>
<rect x="610" y="270" width="145" height="85" fill="#54A24B" opacity="0.86" rx="8"/>
<text x="682.5" y="317.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label C</text>
<rect x="775" y="270" width="145" height="85" fill="#E45756" opacity="0.86" rx="8"/>
<text x="847.5" y="317.5" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="white">label D</text>
<text x="610" y="415" font-family="Inter, Arial, sans-serif" font-size="14" fill="#333">Points in A and C keep labels. One child of B keeps B. The sibling gets D.</text>
<text x="60" y="470" font-family="Inter, Arial, sans-serif" font-size="13" fill="#666">This mechanism is what the stable-label ablation tests. The claim is not recursion alone.</text>
</svg>